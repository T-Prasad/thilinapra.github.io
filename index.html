<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thilina Prasad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #1e293b, #020617);
      color: #e5e7eb;
    }

    .card {
      background: rgba(17, 24, 39, 0.9);
      backdrop-filter: blur(12px);
      padding: 30px 25px;
      border-radius: 20px;
      width: 340px;
      text-align: center;
      box-shadow: 0 15px 50px rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.05);
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    .profile-img {
      width: 95px;
      height: 95px;
      border-radius: 50%;
      border: 3px solid #6366f1;
      margin-bottom: 15px;
    }

    h2 {
      font-weight: 600;
      margin-bottom: 5px;
    }

    .title {
      font-size: 14px;
      color: #9ca3af;
      margin-bottom: 20px;
    }

    .link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 10px 0;
      padding: 12px;
      border-radius: 12px;
      text-decoration: none;
      color: #e5e7eb;
      background: #1f2937;
      transition: all 0.3s ease;
    }

    .link:hover {
      background: #6366f1;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99,102,241,0.5);
    }

    .link i {
      font-size: 18px;
    }

    .contact-btn {
      display: block;
      margin-top: 15px;
      padding: 12px;
      border-radius: 12px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
    }

    .contact-btn:hover {
      opacity: 0.9;
      transform: scale(1.03);
    }

    footer {
      margin-top: 15px;
      font-size: 12px;
      color: #6b7280;
    }

  </style>
</head>

<body>

  <div class="card">
    
    <!-- Profile -->
    <img src="https://via.placeholder.com/150" alt="Profile" class="profile-img">

    <h2>Thilina Prasad</h2>
    <div class="title">Software Engineer | Freelancer</div>

    <!-- Social Links -->
    <a class="link" href="https://instagram.com/yourname" target="_blank">
      <i class="fab fa-instagram"></i> Instagram
    </a>

    <a class="link" href="https://linkedin.com/in/yourname" target="_blank">
      <i class="fab fa-linkedin"></i> LinkedIn
    </a>

    <a class="link" href="https://facebook.com/yourname" target="_blank">
      <i class="fab fa-facebook"></i> Facebook
    </a>

    <a class="link" href="https://wa.me/yournumber" target="_blank">
      <i class="fab fa-whatsapp"></i> WhatsApp
    </a>

    <!-- Save Contact Button -->
    <a class="contact-btn" href="data:text/vcard;charset=utf-8,
BEGIN:VCARD
VERSION:3.0
FN:Thilina Prasad
TEL:+947XXXXXXXX
EMAIL:your@email.com
END:VCARD">
      <i class="fas fa-address-card"></i> Save Contact
    </a>

    <footer>
      © 2026 Thilina Prasad
    </footer>

  </div>

</body>
</html>
